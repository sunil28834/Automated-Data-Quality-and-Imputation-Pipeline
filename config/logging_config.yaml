version: 1
formatters:
  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    formatter: detailed
    level: INFO
  file:
    class: logging.FileHandler
    filename: logs/pipeline.log
    formatter: detailed
    level: DEBUG
root:
  level: DEBUG
  handlers: [console, file]
